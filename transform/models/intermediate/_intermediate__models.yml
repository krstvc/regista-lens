version: 2

models:
  - name: int_team_xref
    description: >
      Team cross-reference linking FBref teams to Understat teams via a curated
      seed file of name mappings. Teams with identical normalized names match
      directly; divergent names are resolved via the seed.
    columns:
      - name: canonical_team_id
        description: Surrogate key for the canonical team identity
        data_tests:
          - unique
          - not_null
      - name: fbref_team_id
        description: FBref team ID
        data_tests:
          - unique
          - not_null
      - name: canonical_team_name
        description: Canonical normalized team name used for matching
        data_tests:
          - not_null
      - name: league
        description: League name
        data_tests:
          - not_null

  - name: int_player_xref
    description: >
      Player cross-reference linking FBref players to Understat players via
      deterministic fuzzy matching. Blocking: normalized last name + league + season.
      Scoring: jaro_winkler name similarity (0.6) + team overlap (0.3) + position (0.1).
      Threshold: 0.75 minimum, 0.90 for auto-match.
    columns:
      - name: canonical_player_id
        description: >
          Canonical player ID (defaults to fbref_player_id unless overridden
          by the manual override seed)
        data_tests:
          - not_null
      - name: fbref_player_id
        description: FBref player ID (always populated)
        data_tests:
          - not_null
      - name: match_status
        description: >
          Match classification: auto_matched (>=0.90), review_needed (0.75-0.90),
          manual_override (from seed), or unmatched (no Understat match found)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["auto_matched", "review_needed", "manual_override", "unmatched"]
      - name: confidence
        description: Composite match score (NULL for unmatched players)
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0.75
                max_value: 1.0
                inclusive: true
              where: "confidence is not null"
