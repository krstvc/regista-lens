version: 2

models:
  - name: dim_season
    description: Season dimension — one row per season in scope
    columns:
      - name: season_key
        description: Surrogate key
        data_tests:
          - unique
          - not_null
      - name: season_label
        description: "Season label (e.g., '2023-2024')"
        data_tests:
          - unique
          - not_null

  - name: dim_competition
    description: Competition dimension — top 5 European leagues
    columns:
      - name: competition_key
        description: Surrogate key
        data_tests:
          - unique
          - not_null
      - name: competition_name
        description: League name
        data_tests:
          - unique
          - not_null

  - name: dim_team
    description: >
      Team dimension — distinct teams from FBref staging data, enriched with
      Understat and Transfermarkt team IDs via int_team_xref.
    columns:
      - name: team_key
        description: Surrogate key
        data_tests:
          - unique
          - not_null
      - name: canonical_team_id
        description: Canonical team ID (from team xref)
        data_tests:
          - unique
          - not_null
      - name: full_name
        description: Original team name from source
        data_tests:
          - not_null

  - name: dim_player
    description: >
      Player dimension — one row per player, attributes from most recent season.
      Understat and Transfermarkt IDs populated via int_player_xref entity resolution.
    columns:
      - name: player_key
        description: Surrogate key
        data_tests:
          - unique
          - not_null
      - name: canonical_player_id
        description: Canonical player ID (from player xref)
        data_tests:
          - unique
          - not_null
      - name: full_name
        description: Original player name from source
        data_tests:
          - not_null

  - name: fct_player_season_stats
    description: >
      Fact table — player season stats at grain of one row per player per team per season.
      FBref provides core stats; Understat provides xG/xA enrichment via entity resolution.
      _sources array indicates which sources contributed to each row.
    columns:
      - name: player_season_stats_key
        description: Surrogate key
        data_tests:
          - unique
          - not_null
      - name: player_key
        description: FK to dim_player
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_key
      - name: team_key
        description: FK to dim_team
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_key
      - name: competition_key
        description: FK to dim_competition
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_competition')
                field: competition_key
      - name: season_key
        description: FK to dim_season
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_season')
                field: season_key
      - name: goals
        description: Goals scored in season (FBref)
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
              where: "goals is not null"
      - name: minutes
        description: Minutes played in season (FBref)
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                inclusive: true
              where: "minutes is not null"
      - name: understat_xg
        description: Expected goals from Understat (NULL if player unmatched)
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
              where: "understat_xg is not null"
      - name: xg_chain
        description: xG Chain from Understat — total xG of possessions player was involved in
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
              where: "xg_chain is not null"
      - name: xg_buildup
        description: xG Buildup from Understat — xG Chain minus shots and key passes
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
              where: "xg_buildup is not null"

  - name: fct_player_season_valuations
    description: >
      Fact table — player season valuations at grain of one row per player per team
      per season. Market values from Transfermarkt, joined via entity resolution.
    columns:
      - name: valuation_key
        description: Surrogate key
        data_tests:
          - unique
          - not_null
      - name: player_key
        description: FK to dim_player
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_key
      - name: team_key
        description: FK to dim_team
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_key
      - name: season_key
        description: FK to dim_season
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_season')
                field: season_key
      - name: competition_key
        description: FK to dim_competition
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_competition')
                field: competition_key
      - name: market_value_eur
        description: Market value in EUR from Transfermarkt
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
              where: "market_value_eur is not null"
